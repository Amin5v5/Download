name: 'دانلودر یوتیوب (بدون نیاز به کوکی)'

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیو (YouTube URL)'
        required: true
        type: string
      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - 'mp4 (video)'
          - 'mp3 (audio only)'
        default: 'mp4 (video)'
      desired_quality:
        description: 'کیفیت (ویدیو: 360p, 720p, 1080p | صدا: 128kbps, 192kbps)'
        required: false
        type: string
        default: '720p'
      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) – 0 = خودکار 1800'
        required: false
        type: string
        default: '90'
      upload_method:
        description: '📤 روش ذخیره'
        required: true
        type: choice
        options:
          - 'repository (push to repo)'
          - 'release (GitHub Releases)'
        default: 'repository (push to repo)'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: راه‌اندازی Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: نصب وابستگی‌ها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y ffmpeg
          npm init -y
          npm install @distube/ytdl-core

      - name: دانلود با ytdl-core
        run: |
          node << 'EOF'
          const fs = require('fs');
          const ytdl = require('@distube/ytdl-core');

          const videoURL = process.env.VIDEO_URL;
          const format = process.env.OUTPUT_FORMAT; // 'mp4 (video)' or 'mp3 (audio only)'
          const quality = process.env.DESIRED_QUALITY; // e.g. '720p' or '192kbps'
          const outputName = process.env.OUTPUT_NAME || 'output';

          async function download() {
            const info = await ytdl.getInfo(videoURL);
            const title = info.videoDetails.title.replace(/[^\w\s\-_]/g, '').substring(0, 60);
            let outputFile;

            if (format === 'mp3 (audio only)') {
              const bitrate = parseInt(quality) || 128;
              const audioFormat = ytdl.chooseFormat(info.formats, {
                quality: 'lowestaudio',
                filter: 'audioonly'
              });
              if (!audioFormat) throw new Error('No audio format found');
              const audioStream = ytdl.downloadFromInfo(info, { format: audioFormat });
              const audioPath = `release_files/${title}.webm`;
              const mp3Path = `release_files/${title}.mp3`;
              audioStream.pipe(fs.createWriteStream(audioPath));
              await new Promise((resolve, reject) => {
                audioStream.on('end', resolve);
                audioStream.on('error', reject);
              });
              // Convert to mp3 with ffmpeg
              require('child_process').execSync(`ffmpeg -y -i "${audioPath}" -b:a ${bitrate}k "${mp3Path}"`);
              fs.unlinkSync(audioPath);
              outputFile = mp3Path;
            } else {
              const height = parseInt(quality) || 720;
              const videoFormat = ytdl.chooseFormat(info.formats, {
                quality: `highestvideo<=${height}`,
                filter: 'videoandaudio'
              });
              if (videoFormat) {
                // Progressive download (video+audio combined)
                const stream = ytdl.downloadFromInfo(info, { format: videoFormat });
                const mp4Path = `release_files/${title}.mp4`;
                stream.pipe(fs.createWriteStream(mp4Path));
                await new Promise((resolve, reject) => {
                  stream.on('end', resolve);
                  stream.on('error', reject);
                });
                outputFile = mp4Path;
              } else {
                // Separate download and merge with ffmpeg
                const videoOnly = ytdl.chooseFormat(info.formats, {
                  quality: `bestvideo<=${height}`,
                  filter: 'videoonly'
                });
                const audioOnly = ytdl.chooseFormat(info.formats, {
                  quality: 'bestaudio',
                  filter: 'audioonly'
                });
                if (!videoOnly || !audioOnly) throw new Error('No suitable formats');
                const videoPath = `release_files/${title}_video.webm`;
                const audioPath = `release_files/${title}_audio.webm`;
                const mp4Path = `release_files/${title}.mp4`;

                const videoStream = ytdl.downloadFromInfo(info, { format: videoOnly });
                const audioStream = ytdl.downloadFromInfo(info, { format: audioOnly });
                videoStream.pipe(fs.createWriteStream(videoPath));
                audioStream.pipe(fs.createWriteStream(audioPath));
                await Promise.all([
                  new Promise(r => videoStream.on('end', r)),
                  new Promise(r => audioStream.on('end', r))
                ]);
                require('child_process').execSync(`ffmpeg -y -i "${videoPath}" -i "${audioPath}" -c copy "${mp4Path}"`);
                fs.unlinkSync(videoPath);
                fs.unlinkSync(audioPath);
                outputFile = mp4Path;
              }
            }
            console.log(`✅ فایل دانلود شد: ${outputFile}`);
          }

          download().catch(err => {
            console.error('خطا:', err.message);
            process.exit(1);
          });
          EOF
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
          DESIRED_QUALITY: ${{ github.event.inputs.desired_quality }}

      - name: تقسیم فایل‌های حجیم
        run: |
          MAX_MB="${{ github.event.inputs.max_part_mb }}"
          if [ "$MAX_MB" -le 0 ] || [ "$MAX_MB" -gt 1800 ]; then MAX_MB=1800; fi
          cd release_files
          for f in *; do
            [ -f "$f" ] || continue
            SIZE=$(stat -c%s "$f")
            if [ "$SIZE" -gt $((MAX_MB * 1024 * 1024)) ]; then
              echo "🔪 تقسیم $f ..."
              BASE="${f%.*}"
              zip -r -s "${MAX_MB}m" "${BASE}.zip" "./$f"
              rm "$f"
            fi
          done
          ls -lh

      - name: ذخیره در مخزن
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          mkdir -p downloads
          mv release_files/* downloads/
          git add downloads/
          git commit -m "⬇️ YouTube: ${{ github.event.inputs.video_url }}" || echo "بدون تغییر"
          git push

      - name: آپلود در Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('yt-{0}', github.run_number) }}
          name: "دانلود یوتیوب – ${{ github.run_number }}"
          files: release_files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: پاک‌سازی
        if: always()
        run: rm -rf release_files
